<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitOps | Registration</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

.container{

    width:450px;

    background:#1e293b;

    padding:35px;

    border-radius:15px;

    border:1px solid #334155;

    box-shadow:0 15px 40px rgba(0,0,0,.45);

}

.logo{

    width:80px;
    height:80px;

    background:#38bdf8;

    color:white;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    margin:auto;

    font-size:35px;

    margin-bottom:20px;

}

h2{

    text-align:center;

    color:white;

    margin-bottom:8px;

    font-weight:700;

}

.subtitle{

    text-align:center;

    color:#94a3b8;

    margin-bottom:25px;

}

.input-box{

    margin-bottom:18px;

}

.input-box label{

    color:#cbd5e1;

    margin-bottom:8px;

    display:block;

    font-weight:600;

}

.input-box input{

    width:100%;

    height:48px;

    padding:12px 15px;

    background:#334155;

    border:1px solid #475569;

    border-radius:10px;

    color:white;

    outline:none;

    transition:.3s;

}

.input-box input::placeholder{

    color:#94a3b8;

}

.input-box input:focus{

    border-color:#38bdf8;

    box-shadow:0 0 10px rgba(56,189,248,.3);

}

.gender{

    margin-bottom:20px;

    color:#cbd5e1;

}

.gender label{

    margin-right:20px;

    cursor:pointer;

}

.gender input{

    margin-right:5px;

}

button{

    width:100%;

    height:50px;

    background:#38bdf8;

    color:white;

    border:none;

    border-radius:10px;

    font-size:17px;

    font-weight:600;

    transition:.3s;

}

button:hover{

    background:#0ea5e9;

    transform:translateY(-2px);

    box-shadow:0 10px 20px rgba(56,189,248,.35);

}

.login-link{

    text-align:center;

    margin-top:20px;

    color:#94a3b8;

}

.login-link a{

    color:#38bdf8;

    text-decoration:none;

    font-weight:600;

}

.login-link a:hover{

    color:white;

}

</style>

</head>
<body>

<div class="container">

<div class="logo">
    <i class="bi bi-person-plus-fill"></i>
</div>

<h2>Create Account</h2>

<p class="subtitle">
    Register to access TransitOps Fleet Management
</p>

<form action="/register" method="POST">

<div class="input-box">
<label>Full Name</label>
<input type="text"
name="name"
placeholder="Enter your full name"
required>
</div>

<div class="input-box">
<label>Email Address</label>
<input type="email"
name="email"
placeholder="Enter your email"
required>
</div>

<div class="input-box">
<label>Mobile Number</label>
<input type="tel"
name="phone"
placeholder="Enter your mobile number"
required>
</div>

<div class="gender">

<label>
<input type="radio"
name="gender"
value="Male"
required>
Male
</label>

<label>
<input type="radio"
name="gender"
value="Female">
Female
</label>

</div>

<div class="input-box">
<label>Password</label>
<input type="password"
name="password"
placeholder="Create password"
required>
</div>

<div class="input-box">
<label>Confirm Password</label>
<input type="password"
name="confirm_password"
placeholder="Confirm password"
required>
</div>

<button type="submit">

<i class="bi bi-person-check-fill"></i>

Register

</button>

<div class="login-link">

Already have an account?

<a href="/login">

Login

</a>

</div>

</form>

</div>

</body>
</html>
