```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | TransitOps</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Segoe UI,sans-serif;
        }

        .content{
            max-width:900px;
            margin:40px auto;
            padding:20px;
        }

        .profile-card{
            background:#1e293b;
            border:1px solid #334155;
            border-radius:15px;
            padding:35px;
        }

        .profile-img{
            width:120px;
            height:120px;
            border-radius:50%;
            background:#3b82f6;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:55px;
            margin:auto;
            color:white;
        }

        label{
            color:#cbd5e1;
            margin-top:15px;
        }

        .form-control{
            background:#334155;
            border:1px solid #475569;
            color:white;
        }

        .form-control:focus{
            background:#334155;
            color:white;
            border-color:#3b82f6;
            box-shadow:none;
        }

        .btn-save{
            background:#3b82f6;
            color:white;
            border:none;
        }

        .btn-save:hover{
            background:#2563eb;
        }

    </style>

</head>
<body>

<div class="content">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="profile-card">

        <div class="text-center">

            <div class="profile-img">
                <i class="bi bi-person"></i>
            </div>

            <h3 class="mt-3">{{ user.name }}</h3>

            <p class="text-secondary">
                {{ user.role }}
            </p>

        </div>

        <hr>

        <form method="POST" action="{{ url_for('profile.update_profile') }}">

            <div class="row">

                <div class="col-md-6">

                    <label>Full Name</label>

                    <input
                        type="text"
                        class="form-control"
                        name="name"
                        value="{{ user.name }}"
                        required>

                </div>

                <div class="col-md-6">

                    <label>Email</label>

                    <input
                        type="email"
                        class="form-control"
                        name="email"
                        value="{{ user.email }}"
                        required>

                </div>

                <div class="col-md-6">

                    <label>Phone</label>

                    <input
                        type="text"
                        class="form-control"
                        name="phone"
                        value="{{ user.phone }}">

                </div>

                <div class="col-md-6">

                    <label>Role</label>

                    <input
                        type="text"
                        class="form-control"
                        value="{{ user.role }}"
                        readonly>

                </div>

            </div>

            <div class="mt-4">

                <button class="btn btn-save" type="submit">
                    <i class="bi bi-floppy"></i>
                    Save Changes
                </button>

                <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-secondary ms-2">
                    Back to Dashboard
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
```
