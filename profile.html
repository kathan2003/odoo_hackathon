<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | TransitOps</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Segoe UI,sans-serif;
        }

        .content{
            margin-left:270px;
            padding:40px;
        }

        .profile-card{
            background:#1e293b;
            border:1px solid #334155;
            border-radius:15px;
            padding:35px;
        }

        .profile-img{
            width:120px;
            height:120px;
            border-radius:50%;
            background:#3b82f6;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:55px;
            margin:auto;
            color:white;
        }

        label{
            color:#cbd5e1;
            margin-top:15px;
        }

        .form-control{
            background:#334155;
            border:1px solid #475569;
            color:white;
        }

        .form-control:focus{
            background:#334155;
            color:white;
            border-color:#3b82f6;
            box-shadow:none;
        }

        .btn-save{
            background:#3b82f6;
            color:white;
            border:none;
        }

        .btn-save:hover{
            background:#2563eb;
        }

    </style>

</head>
<body>

<!-- Sidebar Here -->

<!-- Navbar Here -->

<div class="content">

    <div class="profile-card">

        <div class="text-center">

            <div class="profile-img">
                <i class="bi bi-person"></i>
            </div>

            <h3 class="mt-3">Admin User</h3>

            <p class="text-secondary">
                Fleet Manager
            </p>

        </div>

        <hr>

        <div class="row">

            <div class="col-md-6">

                <label>Full Name</label>

                <input
                    type="text"
                    class="form-control"
                    value="Admin User">

            </div>

            <div class="col-md-6">

                <label>Email</label>

                <input
                    type="email"
                    class="form-control"
                    value="admin@transitops.com">

            </div>

            <div class="col-md-6">

                <label>Phone</label>

                <input
                    type="text"
                    class="form-control"
                    value="+91 9876543210">

            </div>

            <div class="col-md-6">

                <label>Role</label>

                <input
                    type="text"
                    class="form-control"
                    value="Fleet Manager"
                    readonly>

            </div>

        </div>

        <div class="mt-4">

            <button class="btn btn-save">
                <i class="bi bi-floppy"></i>
                Save Changes
            </button>

        </div>

    </div>

</div>

</body>
</html>
