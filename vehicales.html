<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vehicle Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0F172A;
            color: #E2E8F0;
            font-family: "Segoe UI", sans-serif;
        }

        /* Navbar */

        .navbar {
            background: #111827;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .4);
        }

        .navbar-brand {
            color: #60A5FA !important;
            font-size: 25px;
            font-weight: bold;
        }

        .nav-link {
            color: #CBD5E1 !important;
        }

        .nav-link:hover {
            color: #60A5FA !important;
        }

        /* Card */

        .card {
            background: #1E293B;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, .35);
        }

        h2 {
            color: #60A5FA;
            font-weight: bold;
        }

        /* Search */

        .form-control,
        .form-select {

            background: #0F172A;
            border: 1px solid #334155;
            color: white;

        }

        .form-control::placeholder {

            color: #94A3B8;

        }

        .form-control:focus,
        .form-select:focus {

            background: #0F172A;
            color: white;
            border-color: #3B82F6;
            box-shadow: none;

        }

        .form-select option {

            background: #1E293B;
            color: white;

        }

        /* Table */

        .table {

            color: white;

        }

        .table thead {

            background: #2563EB;

        }

        .table thead th {

            color: white;
            border: none;

        }

        .table tbody td {

            background: #1E293B;
            color: #E2E8F0;
            border-color: #334155;

        }

        .table-hover tbody tr:hover td {

            background: #334155;

        }

        /* Status */

        .status {

            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;

        }

        .available {

            background: #22C55E;
            color: white;

        }

        .trip {

            background: #2563EB;
            color: white;

        }

        .shop {

            background: #F59E0B;
            color: black;

        }

        .retired {

            background: #EF4444;
            color: white;

        }

        /* Buttons */

        .btn {

            border-radius: 8px;
            transition: .3s;

        }

        .btn-success {

            background: #10B981;
            border: none;

        }

        .btn-success:hover {

            background: #059669;
            transform: translateY(-2px);

        }

        .btn-primary {

            background: #2563EB;
            border: none;

        }

        .btn-primary:hover {

            background: #1D4ED8;

        }

        .btn-warning {

            background: #F59E0B;
            border: none;
            color: white;

        }

        .btn-warning:hover {

            background: #D97706;

        }

        .btn-danger {

            background: #EF4444;
            border: none;

        }

        .btn-danger:hover {

            background: #DC2626;

        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand" href="#">
                <i class="bi bi-truck"></i>
                TransitOps
            </a>

            <div>

                <a href="vehicles.html" class="btn btn-primary btn-sm">
                    Vehicles
                </a>

                <a href="drivers.html" class="btn btn-outline-light btn-sm">
                    Drivers
                </a>

            </div>

        </div>

    </nav>

    <!-- Main -->

    <div class="container mt-5">

        <div class="card p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2>
                    <i class="bi bi-truck"></i>
                    Vehicle Management
                </h2>

                <a href="vehicle_add.html" class="btn btn-success">
                    <i class="bi bi-plus-circle"></i>
                    Add Vehicle
                </a>

            </div>

            <div class="row mb-4">

                <div class="col-md-5">

                    <input type="text"
                        class="form-control"
                        placeholder="Search Registration Number">

                </div>

                <div class="col-md-3">

                    <select class="form-select">

                        <option>All Status</option>
                        <option>Available</option>
                        <option>On Trip</option>
                        <option>In Shop</option>
                        <option>Retired</option>

                    </select>

                </div>

                <div class="col-md-2">

                    <button class="btn btn-primary w-100">
                        Search
                    </button>

                </div>

            </div>

            <div class="table-responsive">

                <table class="table table-hover table-bordered align-middle">

                    <thead>

                        <tr>

                            <th>ID</th>
                            <th>Registration</th>
                            <th>Model</th>
                            <th>Type</th>
                            <th>Capacity</th>
                            <th>Odometer</th>
                            <th>Cost</th>
                            <th>Status</th>
                            <th width="150">Action</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr>

                            <td>1</td>
                            <td>GJ01AB1234</td>
                            <td>Tata Ace</td>
                            <td>Mini Truck</td>
                            <td>1000 Kg</td>
                            <td>45,000 Km</td>
                            <td>₹7,50,000</td>

                            <td>

                                <span class="status available">
                                    Available
                                </span>

                            </td>

                            <td>

                                <button class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <button class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>

                            </td>

                        </tr>

                        <tr>

                            <td>2</td>
                            <td>GJ05XY5678</td>
                            <td>Ashok Leyland</td>
                            <td>Truck</td>
                            <td>5000 Kg</td>
                            <td>90,000 Km</td>
                            <td>₹18,00,000</td>

                            <td>

                                <span class="status trip">
                                    On Trip
                                </span>

                            </td>

                            <td>

                                <button class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <button class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
