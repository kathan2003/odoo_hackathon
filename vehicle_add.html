<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:#e2e8f0;
            font-family:'Segoe UI',sans-serif;
        }

        .navbar{
            background:#111827;
            box-shadow:0 5px 15px rgba(0,0,0,.4);
        }

        .navbar-brand{
            color:#60a5fa !important;
            font-weight:bold;
            font-size:24px;
        }

        .card{
            background:#1e293b;
            border:none;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.4);
        }

        h2{
            color:#60a5fa;
            font-weight:bold;
        }

        label{
            color:#cbd5e1;
            font-weight:600;
        }

        .form-control,
        .form-select{
            background:#0f172a;
            color:white;
            border:1px solid #334155;
        }

        .form-control::placeholder{
            color:#94a3b8;
        }

        .form-control:focus,
        .form-select:focus{
            background:#0f172a;
            color:white;
            border-color:#3b82f6;
            box-shadow:none;
        }

        .form-select option{
            background:#1e293b;
            color:white;
        }

        .required{
            color:#ef4444;
        }

        hr{
            border-color:#334155;
        }

        /* Buttons */

        .btn{
            border-radius:8px;
            transition:.3s;
            padding:10px 20px;
            font-weight:600;
        }

        .btn-save{
            background:#10b981;
            color:white;
            border:none;
        }

        .btn-save:hover{
            background:#059669;
            transform:translateY(-2px);
        }

        .btn-reset{
            background:#475569;
            color:white;
            border:none;
        }

        .btn-reset:hover{
            background:#334155;
        }

        .btn-back{
            background:#2563eb;
            color:white;
            border:none;
        }

        .btn-back:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">

<i class="bi bi-truck"></i>

TransitOps

</a>

</div>

</nav>

<div class="container mt-5">

<div class="card p-4">

<h2 class="mb-4">

<i class="bi bi-plus-circle-fill"></i>

Add Vehicle

</h2>

<!-- Flash messages will appear here after connecting Flask backend -->

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>
Registration Number
<span class="required">*</span>
</label>

<input type="text" name="registration_number" class="form-control" placeholder="GJ01AB1234" required>

</div>

<div class="col-md-6 mb-3">

<label>
Vehicle Model
</label>

<input type="text" name="model" class="form-control" placeholder="Tata Ace" required>

</div>

<div class="col-md-6 mb-3">

<label>
Vehicle Type
</label>

<select name="vehicle_type" class="form-select" required>

    <option value="">Select Type</option>
    <option value="Mini Truck">Mini Truck</option>
    <option value="Truck">Truck</option>
    <option value="Container">Container</option>
    <option value="Bus">Bus</option>
    <option value="Van">Van</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>
Capacity (KG)
</label>

<input type="number" name="capacity" class="form-control" placeholder="1000" required>

</div>

<div class="col-md-6 mb-3">

<label>
Current Odometer (KM)
</label>

<input type="number" name="odometer" class="form-control" placeholder="45000" required>

</div>

<div class="col-md-6 mb-3">

<label>
Acquisition Cost (₹)
</label>

<input type="number" name="acquisition_cost" class="form-control" placeholder="750000" required>    

</div>

<div class="col-md-6 mb-4">

<label>
Vehicle Status
</label>

<select name="status" class="form-select">

    <option value="Available">Available</option>
    <option value="On Trip">On Trip</option>
    <option value="In Shop">In Shop</option>
    <option value="Retired">Retired</option>

</select>

</div>

</div>

<hr>

<div class="d-flex gap-2">

    <button type="submit" class="btn btn-save">
        <i class="bi bi-check-circle-fill"></i>
        Save Vehicle
    </button>

    <button type="reset" class="btn btn-reset">
        <i class="bi bi-arrow-clockwise"></i>
        Reset
    </button>

    <a href="/vehicles" class="btn btn-back">
        <i class="bi bi-arrow-left-circle"></i>
        Back
    </a>

</div>

</form>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
