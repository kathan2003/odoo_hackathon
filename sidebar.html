<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            margin:0;
            background:#0f172a;
        }

        .sidebar{
            width:260px;
            height:100vh;
            background:#1e293b;
            border-right:1px solid #334155;
            position:fixed;
            left:0;
            top:0;
            overflow-y:auto;
        }

        .logo{
            padding:25px;
            text-align:center;
            border-bottom:1px solid #334155;
        }

        .logo h3{
            color:#3b82f6;
            margin:0;
            font-weight:bold;
        }

        .menu{
            padding:20px 10px;
        }

        .menu a{
            display:flex;
            align-items:center;
            text-decoration:none;
            color:#cbd5e1;
            padding:12px 18px;
            margin-bottom:8px;
            border-radius:10px;
            transition:.3s;
        }

        .menu a:hover{
            background:#3b82f6;
            color:#fff;
        }

        .menu a.active{
            background:#2563eb;
            color:#fff;
        }

        .menu i{
            margin-right:12px;
            font-size:18px;
        }

        .menu-title{
            color:#64748b;
            font-size:13px;
            text-transform:uppercase;
            margin:20px 15px 10px;
        }

    </style>

</head>
<body>

<div class="sidebar">

    <div class="logo">
        <h3><i class="bi bi-truck"></i> TransitOps</h3>
    </div>

    <div class="menu">

        <div class="menu-title">Main Menu</div>

        <a href="#" class="active">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="#">
            <i class="bi bi-truck"></i>
            Vehicles
        </a>

        <a href="#">
            <i class="bi bi-person-badge"></i>
            Drivers
        </a>

        <a href="#">
            <i class="bi bi-map"></i>
            Trips
        </a>

        <a href="#">
            <i class="bi bi-tools"></i>
            Maintenance
        </a>

        <div class="menu-title">Reports</div>

        <a href="#">
            <i class="bi bi-graph-up-arrow"></i>
            Analytics
        </a>

        <a href="#">
            <i class="bi bi-file-earmark-text"></i>
            Reports
        </a>

        <div class="menu-title">Account</div>

        <a href="#">
            <i class="bi bi-person-circle"></i>
            Profile
        </a>

        <a href="#">
            <i class="bi bi-gear"></i>
            Settings
        </a>

        <a href="#">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    </div>

</div>

</body>
</html>
