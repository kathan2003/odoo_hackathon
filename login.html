<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        body{
            background:#0f172a;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{

            width:400px;
            background:#1e293b;

            padding:40px;

            border-radius:15px;

            box-shadow:0 15px 40px rgba(0,0,0,.45);

            border:1px solid #334155;
        }

        .logo{

            width:80px;
            height:80px;

            background:#38bdf8;

            color:white;

            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            margin:auto;

            font-size:35px;

            margin-bottom:20px;

        }

        h2{

            color:#fff;

            text-align:center;

            margin-bottom:8px;

            font-weight:700;

        }

        .subtitle{

            text-align:center;

            color:#94a3b8;

            margin-bottom:30px;

        }

        .form-label{

            color:#cbd5e1;

            font-weight:600;

            margin-bottom:8px;

        }

        .form-control{

            height:50px;

            background:#334155;

            border:1px solid #475569;

            color:white;

            border-radius:10px;

            padding-left:15px;

        }

        .form-control::placeholder{

            color:#94a3b8;

        }

        .form-control:focus{

            background:#334155;

            color:white;

            border-color:#38bdf8;

            box-shadow:0 0 10px rgba(56,189,248,.3);

        }

        .btn-login{

            width:100%;

            height:50px;

            background:#38bdf8;

            color:white;

            font-size:17px;

            font-weight:bold;

            border:none;

            border-radius:10px;

            transition:.3s;

        }

        .btn-login:hover{

            background:#0ea5e9;

            transform:translateY(-2px);

            box-shadow:0 10px 25px rgba(56,189,248,.35);

            color:white;

        }

        .extra{

            text-align:center;

            margin-top:20px;

            color:#94a3b8;

            font-size:14px;

        }

        .extra a{

            color:#38bdf8;

            text-decoration:none;

            font-weight:600;

        }

        .extra a:hover{

            color:white;

        }

    </style>

</head>
<body>

<div class="login-card">

    <div class="logo">
        <i class="bi bi-truck"></i>
    </div>

    <h2>TransitOps</h2>

    <p class="subtitle">
        Fleet Management System
    </p>

    <form action="/login" method="POST">

        <div class="mb-3">

            <label class="form-label">
                Email Address
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required>

        </div>

        <button type="submit" class="btn btn-login">

            <i class="bi bi-box-arrow-in-right"></i>

            Login

        </button>

    </form>

    <div class="extra">

        Don't have an account?

        <a href="/register">

            Register

        </a>

    </div>

</div>

</body>
</html>
